<html lang="en">
	<head>
		<title>Pandora Test</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
			html {
				width: 100%;
				height: 100%;
			}

		    body {
				width: 100%;
				height: 100%;
    		    text-align: center;
    		    color: rgb(84, 84, 84);
				font-family: -apple-system, BlinkMacSystemFont,
					"Segoe UI", "Roboto", "Oxygen",
					"Ubuntu", "Cantarell", "Open Sans", "Fira Sans",
					"Droid Sans", "Helvetica Neue", sans-serif;
				margin: 0;
		    }

			body > div {
			   margin: 0 auto;
			   top: 50%;
			   left: 50%;
			   -webkit-transform: translate(-50%, -50%);
			   -moz-transform: translate(-50%, -50%);
			   -o-transform: translate(-50%, -50%);
			   -ms-transform: translate(-50%, -50%);
			   position: absolute;
			   max-height: 100%;
			}

			h1 {
				font-size: 4em;
				font-weight: lighter;
			}

			h2 {
			    font-size: 2em;
				font-weight: lighter;
			}

			simple-component p {
				color: red;
			}

			responsive-navigation {
				box-shadow: 0 1.5px 4px rgba(0,0,0,.24),0 1.5px 6px rgba(0,0,0,.12);
				top: 0;
				position: fixed;
			}
		</style>
		<script src="./../dist/pandora.js"></script>
	</head>

	<body>
		<responsive-navigation phone="top" phablet="top" tablet="top" title="Responsive Navigation" fixed="true"></responsive-navigation>
		<h1>Pandora Test</h1>
		<custom-element></custom-element>
		<custom-shadow-element></custom-shadow-element>

		<template id="custom-element">
			<h2>This is from a template!</h2>
		</template>

		<script>
			class CustomElement extends Pandora.Component {

				constructor () {
					super ();
					this.props = {
						text: ''
					};
				}

				render () {
					return `<h2>${this.props.text}</h2>`;
				}
			}

			console.log (CustomElement.tag);

			window.customElements.define (CustomElement.tag, CustomElement);

			const element = document.querySelector ('custom-element');

			element.setProps ( {
				text: 'Hello World!'
			});


			class CustomShadowElement extends Pandora.ShadowComponent {
				constructor () {
					super ();
					this.props = {
						text: ''
					};
				}

				render () {
					return `<h2>${this.props.text}</h2>`;
				}
			}

			console.log (CustomShadowElement.tag);

			window.customElements.define (CustomShadowElement.tag, CustomShadowElement);

			const shadowElement = document.querySelector (CustomShadowElement.tag);

			shadowElement.setProps ( {
				text: 'Hello World!'
			});

			shadowElement.setStyle ({
				h2: {
					color: '#eee'
				},
				'@media screen and (min-width: 62em)': {
					h2: {
						color: 'black'
					}
				}
			});

class ResponsiveNavigation extends Pandora.ShadowComponent {

			'title': '',
			'logo': '',
			'items': [],
			'active': false,


			// Behaviors
			'phone': 'top',
			'phablet': 'top',
			'tablet': 'side',
			'desktop': 'side',
			'desktop-large': 'side',
			'retina': 'side',
			'fixed': false,
			'side': 'left',

			// Breakpoints
			'phone-breakpoint': '480px',
			'phablet-breakpoint': '601px',
			'tablet-breakpoint': '992px',

				height: auo;

			li > * {

				display: flex;

				width: 100%;

				min-width: 1.5rem;

				height: 3.5rem;

				-ms-grid-row-align: center;
				align-self: center;
				max-width: 80%;
				max-height: 80%;
				padding: 0 .5rem;
				height: 100%;
			}

			header .title {
				-ms-grid-row-align: center;
				align-self: center;
				margin: 0;
				margin-left: .1rem;
				font-size: 1.5rem;
			}

			ul {
				margin: 0;
				padding: 0;
				width: auto;
				max-height: 100%;
				display: none;
				align-items: center;

			}

			a {
					color: inherit;
					text-decoration: none;
			}

			@media (min-width: ${this.props['phablet-breakpoint']}) {
				:host([phablet="top"]) {
					display: flex;
					overflow: hidden;
					flex-wrap: nowrap;
				}

				:host([phablet="top"]) .menu-icon {
					display: none;
				}

				:host([phablet="top"]) ul {
					display: flex;
					max-height: 3.5rem;
				}

				:host([phablet="top"]) ul li {
					height: 100%;
				}

				:host([phablet="top"]) ul li > * {
					justify-content: center;
				}

				:host([phablet="top"]) ul[full] {
					display: flex;
					width: 100%;
					justify-content: center;
					height: 3.5rem;
				}

				:host([phablet="top"]) ul[full] li {
					height: 100%;
				}

				:host([phablet="top"]) ul[full] li > * {
					justify-content: center;
				}

				:host([phablet="side"]) {
					width: 30%;
					height: 100%;
					float: left;
					max-height: 100%;
					flex-flow: column;
					overflow: hidden;
				}

				:host([phablet="side"]) header {
					height: auto;
					min-height: 0;
					min-height: initial;
					flex-flow: column;
					padding-bottom: .5rem;
					border-bottom: 1px solid #eee;
					max-height: none;
					max-height: initial;
					max-width: 100%;
					flex-shrink: 0;
				}

				:host([phablet="side"]) header .logo {
					max-height: 10rem;
					margin: .5rem 0;
				}

				:host([phablet="side"]) header .title {
					text-align: center;
				}

				:host([phablet="side"]) .menu-icon {
					display: none;
				}

				:host([phablet="side"]) ul {
					display: flex;
					flex-flow: column;
					overflow: auto;
					max-height: initial;
					height: 100%;
					overflow-x: hidden;
				}

				:host([phablet="side"]) ul li {
					height: auto;
					width: 100%;
					min-height: 2rem;
				}

				:host([phablet="side"]) ul li > * {
					width: 100%;
					justify-content: flex-start;
				}

				:host([phablet="side"]) ul li .icon {
					max-height: 100%;
					height: 2rem;
					min-height: 1.5rem;
					line-height: 1.4rem;
				}

			}

			@media (min-width: ${this.props['tablet-breakpoint']}) {
				:host([tablet="top"]) {
					display: flex;
					overflow: hidden;
					flex-wrap: nowrap;
				}

				:host([tablet="top"]) .menu-icon {

				:host([tablet="top"]) ul[full] {

				}

				:host([tablet="side"]) {
					width: 20%;
					height: 100%;
					float: left;
					max-height: 100%;
					flex-flow: column;
					overflow: hidden;
				}

				:host([tablet="side"]) header {
					height: auto;
					min-height: 0;
					min-height: initial;
					flex-flow: column;
					padding-bottom: .5rem;
					border-bottom: 1px solid #eee;
					max-height: none;
					max-height: initial;
					max-width: 100%;
					flex-shrink: 0;
				}

				:host([tablet="side"]) header .logo {
					max-height: 10rem;
					margin: .5rem 0;
				}

				:host([tablet="side"]) header .title {
					text-align: center;
				}

				:host([tablet="side"]) .menu-icon {
					display: none;
				}

				:host([tablet="side"]) ul {
					display: flex;
					flex-flow: column;
					overflow: auto;
					max-height: initial;
					height: 100%;
					overflow-x: hidden;
				}

				:host([tablet="side"]) ul li {
					height: auto;
					width: 100%;
					min-height: 2rem;
				}

				:host([tablet="side"]) ul li > * {
					width: 100%;
					justify-content: flex-start;
				}

				:host([tablet="side"]) ul li .icon {
					max-height: 100%;
					height: 2rem;
					min-height: 1.5rem;
					line-height: 1.4rem;
				}

			}

			@media (min-width: ${this.props['desktop-breakpoint']}) {
				:host([desktop="top"]) {
					display: flex;
					overflow: hidden;
					flex-wrap: nowrap;
				}

				:host([desktop="top"]) .menu-icon {
					display: none;
				}

				:host([desktop="top"]) ul {
					display: flex;
					max-height: 3.5rem;
				}

				:host([desktop="top"]) ul li {
					height: 100%;
				}

				:host([desktop="top"]) ul li > * {
					justify-content: center;
				}

				:host([desktop="top"]) ul[full] {
					display: flex;
					width: 100%;
					justify-content: center;
					height: 3.5rem;
				}

				:host([desktop="top"]) ul[full] li {
					height: 100%;
				}

				:host([desktop="top"]) ul[full] li > * {
					justify-content: center;
				}

				:host([desktop="side"]) {
					width: 20%;
					height: 100%;
					float: left;
					max-height: 100%;
					flex-flow: column;
					overflow: hidden;
				}

				:host([desktop="side"]) header {
					height: auto;
					min-height: 0;
					min-height: initial;
					flex-flow: column;
					padding-bottom: .5rem;
					border-bottom: 1px solid #eee;
					max-height: none;
					max-height: initial;
					max-width: 100%;
					flex-shrink: 0;
				}

				:host([desktop="side"]) header .logo {
					max-height: 10rem;
					margin: .5rem 0;
				}

				:host([desktop="side"]) header .title {
					text-align: center;
				}

				:host([desktop="side"]) .menu-icon {
					display: none;
				}

				:host([desktop="side"]) ul {
					display: flex;
					flex-flow: column;
					overflow: auto;
					max-height: initial;
					height: 100%;
					overflow-x: hidden;
				}

				:host([desktop="side"]) ul li {
					height: auto;
					width: 100%;
					min-height: 2rem;
				}

				:host([desktop="side"]) ul li > * {
					width: 100%;
					justify-content: flex-start;
				}

				:host([desktop="side"]) ul li .icon {
					max-height: 100%;
					height: 2rem;
					min-height: 1.5rem;
					line-height: 1.4rem;
				}
			}

			@media (min-width: ${this.props['desktop-large-breakpoint']}) {
				:host([desktop-large="top"]) {
					display: flex;
					overflow: hidden;
					flex-wrap: nowrap;
				}

				:host([desktop-large="top"]) .menu-icon {
					display: none;
				}

				:host([desktop-large="top"]) ul {
					display: flex;
					max-height: 3.5rem;
				}

				:host([desktop-large="top"]) ul li {
					height: 100%;
				}

				:host([desktop-large="top"]) ul li > * {
					justify-content: center;
				}

				:host([desktop-large="top"]) ul[full] {
					display: flex;
					width: 100%;
					justify-content: center;
					height: 3.5rem;
				}

				:host([desktop-large="top"]) ul[full] li {
					height: 100%;
				}

				:host([desktop-large="top"]) ul[full] li > * {
					justify-content: center;
				}

				:host([desktop-large="side"]) {
					width: 15%;
					height: 100%;
					float: left;
					max-height: 100%;
					flex-flow: column;
					overflow: hidden;
				}

				:host([desktop-large="side"]) header {
					height: auto;
					min-height: 0;
					min-height: initial;
					flex-flow: column;
					padding-bottom: .5rem;
					border-bottom: 1px solid #eee;
					max-height: none;
					max-height: initial;
					max-width: 100%;
					flex-shrink: 0;
				}

				:host([desktop-large="side"]) header .logo {
					max-height: 10rem;
					margin: .5rem 0;
				}

				:host([desktop-large="side"]) header .title {
					text-align: center;
				}

				:host([desktop-large="side"]) .menu-icon {
					display: none;
				}

				:host([desktop-large="side"]) ul {
					display: flex;
					flex-flow: column;
					overflow: auto;
					max-height: initial;
					height: 100%;
					overflow-x: hidden;
				}

				:host([desktop-large="side"]) ul li {
					height: auto;
					width: 100%;
					min-height: 2rem;
				}

				:host([desktop-large="side"]) ul li > * {
					width: 100%;
					justify-content: flex-start;
				}

				:host([desktop-large="side"]) ul li .icon {
					max-height: 100%;
					height: 2rem;
					min-height: 1.5rem;
					line-height: 1.4rem;
				}
			}

		`);

		return Promise.resolve ();
	}

	didMount () {
		console.log (this.dom.querySelector('.menu-icon'));
		this.dom.querySelector('.menu-icon').onclick = () => {
			this.setProps({
				active: this.props.active !== 'true'
			});
		};
		return Promise.resolve ();
	}

	render () {
		console.log (this.props.title);
		return `
			${ this.props.logo || this.props.title ? `
				<header>
					${ this.props.logo ? `<img src="${this.props.logo}" class="logo">` : '' }
					${ this.props.title ? `<h1 class="title">${this.props.title}</h1>` : '' }
				</header>
			`: '' }
			<i class="menu-icon">Menu</i>
			<ul>
				${this.props.items.map (item => `
					<li>
						${ item.link ? `<a href="${item.link}">` : '' }
							${ item.icon ? `<img  src="${item.icon}" class="icon">`: '' }
								${ item.text ? item.text : ''}
							${ item.link ? '</a>' : '' }
					</li>

				`).join ('')}
			</ul>
		`;
	}
}
		window.customElements.define ('responsive-navigation', ResponsiveNavigation, { extends: 'nav' });

		const navigation = document.querySelector('responsive-navigation');

		navigation.setProps ({
			items: [
				{
					text: 'Home',
					link: '#'
				},
				{
					text: 'Blog',
					link: '#'
				},
				{
					text: 'Pricing',

				},
				{

				},

		});

	</body>
</html>
